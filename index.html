      function formatCurrency(num) {
        if (num == null) return "-";
        var formatted =
          "R " +
          Math.abs(num).toLocaleString("en-ZA", {
            minimumFractionDigits: 0,
            maximumFractionDigits: 0,
          });
        return num < 0 ? "(" + formatted + ")" : formatted;
      }

        document.body.classList.remove("pdf-export");
        var actions = document.querySelector(".print-actions");
        if (actions) actions.style.display = "";
        var btn = document.getElementById("export-pdf");
        if (btn) {
          btn.disabled = false;
          btn.textContent = "Export to PDF";
        }
      }
      function convertImagesToBase64(element) {
        var imgs = element.querySelectorAll("img[src]");
        var promises = Array.from(imgs).map(function (img) {
          var src = img.src || img.getAttribute("src");
          if (!src || src.indexOf("data:") === 0) return Promise.resolve();
          return fetch(src)
            .then(function (r) {
              return r.blob();
            })
            .then(function (blob) {
              return new Promise(function (resolve, reject) {
                var reader = new FileReader();
                reader.onloadend = function () {
                  resolve(reader.result);
                };
                reader.onerror = reject;
                reader.readAsDataURL(blob);
              });
            })
            .then(function (dataUrl) {
              img.src = dataUrl;
            });
        });
        return Promise.all(promises);
      }
      document
        .getElementById("export-pdf")
        .addEventListener("click", function () {
          if (window.location.protocol === "file:") {
            alert(
              "PDF export does not work when opening the file directly.\n\nRun in terminal: npx serve\nThen open http://localhost:3000 in your browser.",
            );
            return;
          }
          const btn = document.getElementById("export-pdf");
          btn.disabled = true;
          btn.textContent = "Generating...";
          document.documentElement.classList.add("pdf-export");
          document.body.classList.add("pdf-export");
          document.querySelector(".print-actions").style.display = "none";
          window.scrollTo(0, 0);
          const report = document.getElementById("report");
          report.scrollIntoView({ block: "start", behavior: "instant" });
          const opt = {
            margin: [0, 0, 0, 0],
            filename: "Gold-Report.pdf",
            image: { type: "jpeg", quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: "mm", format: "a4", orientation: "portrait" },
            enableLinks: true,
            pagebreak: { mode: ["css", "legacy"], avoid: ".d2-card" },
          };
          convertImagesToBase64(report)
            .then(function () {
              return html2pdf().set(opt).from(report).save();
            })
            .then(function () {
              restoreExportUI();
            })
            .catch(function (err) {
              console.error("PDF export failed:", err);
              restoreExportUI();
              if (window.location.protocol === "file:") {
                alert(
                  "PDF export requires a local server.\n\nRun: npx serve\nThen open http://localhost:3000",
                );
              } else {
                alert(
                  'PDF export failed. Use Print (Ctrl/Cmd+P) and choose "Save as PDF" instead.',
                );
              }
            });
        });

      document
        .getElementById("print-pdf")
        .addEventListener("click", function () {
          document.querySelector(".print-actions").style.display = "none";
          window.print();
          document.querySelector(".print-actions").style.display = "";
        });
    </script>
  </body>
</html>
